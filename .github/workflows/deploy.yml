name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_ClrYY94PV8MjIomUirEIXeKQ
          VERCEL_PROJECT_ID: prj_nJq3tI7TghzGRcqm9MFiskvEwZmX
